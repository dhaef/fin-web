{{ define "title" }}💰📈{{ end }}
{{ define "scripts" }}
  <script type="module">
    import 'transaction';
  </script>
{{ end }}
{{ define "body" }}
  <div class="my-1">
    <form method="POST" class="form-card">
      {{ if .Data.Success }}
        <div class="form-success">
          <p>Transaction successfully updated!</p>
        </div>
      {{ end }}


      <div class="form-item">
        <label for="name">Name:</label>
        <input name="name" disabled value="{{ .Data.Transaction.Name }}" />
      </div>

      <div class="form-item">
        <label for="amount">Amount:</label>
        <input name="amount" disabled value="{{ .Data.Transaction.Amount }}" />
      </div>

      <div class="form-item">
        <label for="account">Account:</label>
        <input
          name="account"
          disabled
          value="{{ .Data.Transaction.Account }}"
        />
      </div>

      <div class="form-item">
        <label for="date">Date:</label>
        <input name="date" disabled value="{{ .Data.Transaction.Date }}" />
      </div>

      <div class="form-item">
        <label for="category">Category:</label>
        <select name="category">
          {{ range .Data.Categories }}
            <option
              value="{{ .ID }}"
              {{ if
                eq
                .ID
                $.Data.Transaction.CategoryID.Int32
              }}
                selected
              {{ end }}
            >
              {{ .Label }}
            </option>
          {{ end }}
        </select>
      </div>

      <div class="form-item">
        <label for="description">Description:</label>
        <input
          name="description"
          value="{{ .Data.Transaction.Description.Value }}"
        />
      </div>

      <div class="form-item checkbox-item">
        <input
          id="is_reimbursement"
          name="is_reimbursement"
          type="checkbox"
          {{ if .Data.Transaction.IsReimbursement }}checked{{ end }}
        />
        <label for="is_reimbursement">Is Reimbursement</label>
      </div>

      <div class="form-actions">
        <input type="submit" class="btn btn-primary" value="Save" />
        <a href="/" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>

  <form class="form-danger" method="POST" action="/transactions/{{ .Data.Transaction.ID }}/delete" onsubmit="return confirm('Are you sure you want to delete this transaction?')">
    <input type="submit" class="btn btn-danger" value="Delete" />
  </form>
{{ end }}
