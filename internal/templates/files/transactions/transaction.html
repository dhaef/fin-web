{{ define "title" }}💰📈{{ end }}
{{ define "scripts" }}
  <script type="module">
    import 'transaction';
  </script>
{{ end }}
{{ define "body" }}
  <div class="my-1">
    <form method="POST">
      {{ if .Data.Success }}
        <div class="form-success">
          <p>Transaction successfully updated!</p>
        </div>
      {{ end }}


      <div class="form-item">
        <label for="name">Name:</label>
        <input name="name" disabled value="{{ .Data.Transaction.Name }}" />
      </div>

      <div class="form-item">
        <label for="amount">Amount:</label>
        <input name="amount" disabled value="{{ .Data.Transaction.Amount }}" />
      </div>

      <div class="form-item">
        <label for="account">Account:</label>
        <input
          name="account"
          disabled
          value="{{ .Data.Transaction.Account }}"
        />
      </div>

      <div class="form-item">
        <label for="date">Date:</label>
        <input name="date" disabled value="{{ .Data.Transaction.Date }}" />
      </div>

      <div class="form-item">
        <label for="category">Category:</label>
        <select name="category">
          {{ range .Data.Categories }}
            <option
              value="{{ .ID }}"
              {{ if
                eq
                .ID
                $.Data.Transaction.CategoryID.Int32
              }}
                selected
              {{ end }}
            >
              {{ .Label }}
            </option>
          {{ end }}
        </select>
      </div>

      <div class="form-item">
        <label for="description">Description:</label>
        <input
          name="description"
          value="{{ .Data.Transaction.Description.Value }}"
        />
      </div>

      <input type="submit" />
    </form>
  </div>

  <form method="POST" action="/transactions/{{ .Data.Transaction.ID }}/delete">
    <input type="submit" value="Delete" />
  </form>
{{ end }}
