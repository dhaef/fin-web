{{ define "title" }}💰📈{{ end }}
{{ define "scripts" }}
  <script type="module">
    import 'category';
  </script>
{{ end }}
{{ define "body" }}
  <div class="my-1">
    <form id="category-form" class="form-card">
      <div class="form-item">
        <label for="label">Label:</label>
        <input name="label" value="{{ .Data.Category.Label }}" type="text" />
        <p class="form-error label-err"></p>
      </div>

      <div class="form-item">
        <label for="priority">Priority:</label>
        <input
          name="priority"
          value="{{ .Data.Category.Priority }}"
          type="number"
          step="1"
        />
        <p class="form-error priority-err"></p>
      </div>

      <div class="form-item">
        <label for="type">Type:</label>
        <select name="category_type">
          <option>Select Type...</option>
          <option
            value="income"
            {{ if
              eq
              "income"
              $.Data.Category.Type.String
            }}
              selected
            {{ end }}
          >
            Income
          </option>
          <option
            value="fixed"
            {{ if
              eq
              "fixed"
              $.Data.Category.Type.String
            }}
              selected
            {{ end }}
          >
            Fixed
          </option>
          <option
            value="fun"
            {{ if
              eq
              "fun"
              $.Data.Category.Type.String
            }}
              selected
            {{ end }}
          >
            Fun
          </option>
          <option
            value="neutral"
            {{ if
              eq
              "neutral"
              $.Data.Category.Type.String
            }}
              selected
            {{ end }}
          >
            Neutral
          </option>
        </select>
        <p class="form-error type-err"></p>
      </div>

      <div class="form-item checkbox-item">
        <input
          id="is_ignored"
          name="is_ignored"
          type="checkbox"
          {{ if .Data.Category.IsIgnored }}checked{{ end }}
        />
        <label for="is_ignored">Is Ignored</label>
        <p class="form-error is_ignored-err"></p>
      </div>

      <div class="form-item">
        <label>Values:</label>
        <div id="values">
          {{ range .Data.Category.Values }}
            <div class="form-item flex">
              <input
                type="text"
                class="value"
                id="{{ .ID.Int64 }}"
                value="{{ .Value.String }}"
              />
              <button class="rm-value-btn">🗑️</button>
            </div>
          {{ end }}
        </div>
        <p class="form-error values-err"></p>
        <button id="add-value" class="btn btn-secondary">Add Value</button>
      </div>

      <div class="form-actions">
        <input
          type="submit"
          class="btn btn-primary"
          value="{{ if ne .Data.Type "create" -}}
            Save
          {{- else -}}
            Create
          {{- end }}"
        />
        <a href="/categories" class="btn btn-secondary">Cancel</a>
      </div>
    </form>

    {{ if ne .Data.Type "create" }}
      <form class="form-danger" method="POST" action="/categories/{{ .Data.Category.ID }}/delete" onsubmit="return confirm('Are you sure you want to delete this category?')">
        <input type="submit" class="btn btn-danger" value="Delete" />
      </form>
    {{ end }}

  </div>
{{ end }}
